publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.0.5
  shared_preferences: ^2.2.0
  image: ^4.0.17
  path_provider: ^2.1.1
  sqflite: ^2.3.0
  path: ^1.8.3
