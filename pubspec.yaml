  in_app_purchase: ^3.1.7
  share_plus: ^7.1.0
  url_launcher: ^6.2.0
  image_picker: ^1.0.4
  uuid: ^4.1.0
  collection: ^1.18.0
  firebase_core: ^2.27.0
  firebase_remote_config: ^4.3.8

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
